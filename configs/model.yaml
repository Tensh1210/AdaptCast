lgbm:
  n_estimators: 500
  learning_rate: 0.05
  num_leaves: 63
  min_child_samples: 20
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 0.1
  reg_lambda: 0.1
  random_state: 42
  n_jobs: -1

training:
  cv_splits: 5
  retrain_window_size: 8760    # 1 year of hourly data
  val_window_size: 500         # rows used for champion/challenger comparison

features:
  lags: [1, 24, 168]
  rolling_windows: [24, 168]
  target_col: OT
